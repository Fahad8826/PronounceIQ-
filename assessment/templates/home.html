{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronunciation Test — VoiceTest</title>
<link rel="stylesheet" href="{% static 'css/base_theme.css' %}">
</head>
<body>

<nav class="nav">
  <span class="nav-brand">VoiceTest</span>
  <div class="nav-right">
    <span class="nav-username">{{ request.user.username }}</span>
    <a href="/logout/">Logout</a>
  </div>
</nav>

<div class="page-wide" style="margin-top: 40px;">

  <!-- Sentence Selector -->
  <div class="card" style="margin-bottom: 20px;">
    <div class="row" style="justify-content: space-between; margin-bottom: 16px;">
      <h2 style="margin-bottom: 0;">Pronunciation Test</h2>
      <a href="/add-sentence/" class="btn btn-secondary">+ Add Sentence</a>
      <a href="/sentences/" class="btn btn-secondary">Manage Sentences</a>
    </div>

    <form method="GET">
      <div class="form-group" style="margin-bottom: 0;">
        <label for="sentence_id">Select Sentence</label>
        <div class="row">
          <select id="sentence_id" name="sentence_id" style="flex:1;">
            {% for s in sentences %}
              <option value="{{ s.id }}" {% if sentence.id == s.id %}selected{% endif %}>
                {{ s.text }}
              </option>
            {% endfor %}
          </select>
          <button type="submit" class="btn btn-primary">Load</button>
        </div>
      </div>
    </form>
  </div>

  <!-- Test Panel -->
  <div class="card">

    <h3>Current Sentence</h3>
    <div class="sentence-display">{{ sentence.text }}</div>

    <!-- Record Controls -->
    <div class="row" style="margin-bottom: 24px;">
      <button class="btn btn-primary" onclick="startRecording()">
        ● Start Recording
      </button>
      <button class="btn btn-secondary" onclick="stopRecording()">
        ■ Stop
      </button>
      <span class="status" id="status">Idle</span>
    </div>

    <hr class="divider">

    <!-- Result -->
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">

      <div>
        <h3>Playback</h3>
        <audio id="audioPlayback" controls></audio>
      </div>

      <div>
        <h3>Score</h3>
        <div class="result-box">
          <div class="score" id="scoreDisplay">—</div>
          <div id="recognizedText" style="font-size:.875rem; color: var(--text-secondary); margin-top: 6px;"></div>
        </div>
      </div>

    </div>

    <!-- Debug -->
    <h3>Debug Log</h3>
    <div class="debug-log" id="debug"></div>

  </div>
</div>

<script>
let mediaRecorder;
let audioChunks = [];

function log(message) {
  const el = document.getElementById("debug");
  el.innerText += message + "\n";
  el.scrollTop = el.scrollHeight;
}

function setStatus(text, cls) {
  const el = document.getElementById("status");
  el.className = "status " + (cls || "");
  el.innerText = text;
}

async function startRecording() {
  try {
    log("Requesting microphone access...");
    setStatus("Recording...", "recording");
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.start();
    log("Recording started.");
  } catch (error) {
    log("Error: " + error);
    setStatus("Microphone Error", "");
  }
}

function stopRecording() {
  if (!mediaRecorder) { log("Recorder not initialized!"); return; }
  mediaRecorder.stop();
  log("Recording stopped.");
  setStatus("Processing...", "processing");

  mediaRecorder.onstop = async () => {
    try {
      const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      log("Audio blob created.");
      document.getElementById("audioPlayback").src = URL.createObjectURL(audioBlob);

      let formData = new FormData();
      formData.append("audio", audioBlob);
      formData.append("sentence_id", "{{ sentence.id }}");

      log("Sending to backend...");
      const response = await fetch("/upload-audio/", {
        method: "POST",
        headers: { "X-CSRFToken": "{{ csrf_token }}" },
        body: formData
      });

      if (!response.ok) throw new Error("Server error: " + response.status);
      const data = await response.json();

      log("Recognized: " + data.recognized_text);
      log("Score: " + data.score + "%");

      document.getElementById("scoreDisplay").innerText = data.score + "%";
      document.getElementById("recognizedText").innerText = data.recognized_text;
      setStatus("Completed", "completed");

    } catch (error) {
      log("Error: " + error);
      setStatus("Error", "");
    }
    audioChunks = [];
  };
}
</script>

</body>
</html>
