{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — VoiceTest</title>
<link rel="stylesheet" href="{% static 'css/base_theme.css' %}">
</head>
<body>

<nav class="nav">
  <span class="nav-brand">VoiceTest</span>
</nav>

<div class="page" style="margin-top: 72px;">
  <div class="card">

    <h2>Create account</h2>

    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required>
      </div>

      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" placeholder="Repeat your password" required>
      </div>

      <div style="margin-top: 8px;">
        <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      </div>

    </form>

  </div>

  <p class="foot-note">
    Already have an account? <a href="/login/">Sign in</a>
  </p>
</div>

</body>
</html>
