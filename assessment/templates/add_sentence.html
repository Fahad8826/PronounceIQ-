{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Sentence — VoiceTest</title>
<link rel="stylesheet" href="{% static 'css/base_theme.css' %}">
</head>
<body>

<nav class="nav">
  <span class="nav-brand">VoiceTest</span>
  <div class="nav-right">
    <span class="nav-username">{{ request.user.username }}</span>
    <a href="/logout/">Logout</a>
  </div>
</nav>

<div class="page" style="margin-top: 40px;">

  <a href="/" class="back-link">← Back to Home</a>

  <div class="card">
    <h2>Add Sentence</h2>

    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label for="id_language">Language</label>
        {{ form.language }}
      </div>

      <div class="form-group">
        <label for="id_text">Sentence</label>
        {{ form.text }}

        <div class="suggestions-panel" style="margin-top: 10px;">
          <div class="panel-head">Suggestions</div>
          <div id="suggestionList"></div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="margin-top: 8px;">
        Save Sentence
      </button>

    </form>
  </div>

</div>

<script>
const suggestions = {
  en: [
    "Hello how are you",
    "Good morning everyone",
    "Welcome to the pronunciation test",
    "Practice makes perfect"
  ],
  ar: [
    "مرحبا كيف حالك",
    "بسم الله الرحمن الرحيم",
    "السلام عليكم",
    "الحمد لله رب العالمين"
  ],
  fr: [
    "Bonjour comment allez vous",
    "Je suis très heureux",
    "Bienvenue à tous"
  ],
  es: [
    "Hola como estas",
    "Buenos dias",
    "Bienvenido a todos"
  ]
};

const languageField = document.querySelector("#id_language");
const suggestionBox  = document.getElementById("suggestionList");
const textArea       = document.querySelector("#id_text");

languageField.addEventListener("change", loadSuggestions);
loadSuggestions();

function loadSuggestions() {
  const lang = languageField.value;
  suggestionBox.innerHTML = "";
  if (!suggestions[lang]) return;
  suggestions[lang].forEach(sentence => {
    const div = document.createElement("div");
    div.className = "sentence-option";
    div.innerText = sentence;
    div.onclick = () => { textArea.value = sentence; };
    suggestionBox.appendChild(div);
  });
}
</script>

</body>
</html>
